name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ui:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [ui/client, ui/server]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm" # caches ~/.npm and node_modules
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.app }}

      - name: Lint
        run: npm run lint
        working-directory: ${{ matrix.app }}

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.app }}

      - name: Format
        run: npm run format:check
        working-directory: ${{ matrix.app }}

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start backend stack (schema-seeded ephemeral DB)
        run: docker compose -f ci/docker-compose.ci.yml up -d --build

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3040/api/status || true)
            echo "attempt $i: status=$code"
            [ "$code" = "401" ] && exit 0
            sleep 3
          done
          echo "API did not become ready"; docker compose -f ci/docker-compose.ci.yml logs; exit 1

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: ui/client/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: ui/client

      - name: Run e2e suite (Vite dev server + Playwright)
        working-directory: ui/client
        run: |
          # Serve the current client; Vite proxies /api to the stack on :3040.
          npm start > /tmp/vite.log 2>&1 &
          VITE_PID=$!
          for i in $(seq 1 30); do curl -sf http://localhost:5173 >/dev/null && break; sleep 2; done
          curl -sf http://localhost:5173 >/dev/null || { echo "Vite failed to start"; cat /tmp/vite.log; exit 1; }
          # Run in the pinned Playwright image so screenshots match the committed baselines.
          docker run --rm --network host -v "$PWD":/work -w /work \
            -e E2E_BASE_URL=http://localhost:5173 \
            mcr.microsoft.com/playwright:v1.60.0-jammy \
            npx playwright test
          status=$?
          kill "$VITE_PID" 2>/dev/null || true
          exit $status

      - name: Dump backend logs on failure
        if: failure()
        run: docker compose -f ci/docker-compose.ci.yml logs --no-color

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui/client/playwright-report/
          retention-days: 7

  python-api:
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
        poetry-version: ["2.1.2"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: abatilo/actions-poetry@v3
        with:
          poetry-version: ${{ matrix.poetry-version }}
      - name: install deps
        run: poetry install
        working-directory: api
      - name: black
        run: poetry run black --check .
        working-directory: api
      - name: isort
        run: poetry run isort --check .
        working-directory: api
      - name: pyright
        run: poetry run pyright
        working-directory: api
      - name: flake8
        run: poetry run flake8
        working-directory: api
